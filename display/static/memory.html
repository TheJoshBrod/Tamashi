<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamashi | Memory Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --danger-color: #ef4444;
            --success-color: #22c55e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        #graph-container {
            width: 100%;
            height: 100%;
        }

        #sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-hidden {
            transform: translateX(360px);
        }

        h2 { margin-top: 0; font-size: 1.25rem; color: var(--accent-color); }
        h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin: 20px 0 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }
        textarea { height: 100px; resize: none; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .btn-primary { background: var(--accent-color); color: #0f172a; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .shortcut-hint {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.75rem;
            color: #64748b;
            pointer-events: none;
        }

        /* Vis.js Customizations */
        .vis-network:focus { outline: none; }
        .vis-manipulation {
            background: var(--panel-bg) !important;
            border-top: 1px solid var(--border-color) !important;
            height: 40px !important;
        }
        .vis-button {
            color: var(--text-color) !important;
        }
        .vis-button:hover {
            background: var(--bg-color) !important;
        }
    </style>
</head>
<body>
    <div class="shortcut-hint">Drag nodes to move • Select to edit • Use toolbar to add edges</div>
    
    <div id="graph-container"></div>

    <div id="sidebar" class="sidebar-hidden">
        <h2 id="detail-title">Subject Details</h2>
        
        <div id="edit-form">
            <input type="hidden" id="edit-jid">
            
            <div class="form-group">
                <label for="edit-name">Name</label>
                <input type="text" id="edit-name">
            </div>
            
            <div class="form-group">
                <label for="edit-type">Type</label>
                <select id="edit-type">
                    <option value="person">Person</option>
                    <option value="concept">Concept</option>
                    <option value="goal">Goal</option>
                    <option value="event">Event</option>
                    <option value="place">Place</option>
                    <option value="object">Object</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="edit-summary">Summary (One-liner)</label>
                <input type="text" id="edit-summary">
            </div>
            
            <div class="form-group">
                <label for="edit-description">Description (Full log)</label>
                <textarea id="edit-description"></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="saveSubject()">Save Changes</button>
                <button class="btn-ghost" onclick="closeSidebar()">Cancel</button>
            </div>
            
            <div class="button-group" style="margin-top: 10px;">
                <button class="btn-danger" onclick="deleteSubject()">Delete Subject</button>
            </div>
        </div>
    </div>

    <div id="controls">
        <button class="btn-primary" onclick="createNewSubject()">+ New Subject</button>
        <button class="btn-ghost" onclick="refreshGraph()">Refresh</button>
        <button class="btn-ghost" onclick="window.location.href='/display/'">Back to Dashboard</button>
    </div>

    <script src="/display/static/memory.js"></script>
</body>
</html>
