<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Buddy</title>
    <link rel="stylesheet" href="/display/static/styles.css">
</head>

<body>
    <div class="container">
        <div id="creature" class="creature idle">
            <svg viewBox="0 0 200 200" class="creature-svg">
                <!-- Body -->
                <ellipse cx="100" cy="120" rx="60" ry="50" class="body" />

                <!-- Left eye -->
                <g class="eye left-eye">
                    <ellipse cx="75" cy="105" rx="18" ry="22" class="eye-white" />
                    <circle cx="78" cy="108" r="8" class="pupil" />
                    <ellipse cx="73" cy="100" rx="4" ry="3" class="eye-shine" />
                </g>

                <!-- Right eye -->
                <g class="eye right-eye">
                    <ellipse cx="125" cy="105" rx="18" ry="22" class="eye-white" />
                    <circle cx="122" cy="108" r="8" class="pupil" />
                    <ellipse cx="127" cy="100" rx="4" ry="3" class="eye-shine" />
                </g>

                <!-- Mouth -->
                <path class="mouth" d="M 85 140 Q 100 150 115 140" />

                <!-- Blush marks -->
                <ellipse cx="50" cy="130" rx="10" ry="5" class="blush left-blush" />
                <ellipse cx="150" cy="130" rx="10" ry="5" class="blush right-blush" />

                <!-- Thinking dots -->
                <g class="thinking-dots">
                    <circle cx="155" cy="55" r="5" class="dot dot-1" />
                    <circle cx="170" cy="42" r="7" class="dot dot-2" />
                    <circle cx="188" cy="26" r="9" class="dot dot-3" />
                </g>

                <!-- Question mark for confused -->
                <text x="160" y="50" class="question-mark">?</text>

                <!-- Error symbol -->
                <text x="160" y="50" class="error-mark">!</text>

                <!-- Nutrition Accessories (hidden by default) -->
                <g class="pan">
                    <rect x="55" y="165" width="40" height="6" rx="3" fill="#34495E" />
                    <ellipse cx="100" cy="170" rx="30" ry="15" fill="#2C3E50" stroke="#1A252F" stroke-width="2" />
                </g>
                <circle class="food" cx="100" cy="165" r="8" />
            </svg>
        </div>
        <div id="status" class="status">Ready</div>
    </div>
    <script src="/display/static/app.js"></script>
</body>

</html>
